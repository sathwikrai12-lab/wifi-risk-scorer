<!DOCTYPE html>
<html>
<head>
    <title>Wi-Fi Risk Scorer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        .box {
            margin: 30px auto;
            padding: 20px;
            width: 300px;
            background: #1e293b;
            border-radius: 10px;
        }
        select, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }
        canvas {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>📶 Public Wi-Fi Risk Scorer</h1>

<div class="box">
    <select id="encryption">
        <option value="secure">Secure</option>
        <option value="open">Open</option>
    </select>

    <select id="password">
        <option value="strong">Strong Password</option>
        <option value="weak">Weak Password</option>
    </select>

    <select id="https">
        <option value="true">HTTPS Enabled</option>
        <option value="false">No HTTPS</option>
    </select>

    <select id="signal">
        <option value="normal">Normal Signal</option>
        <option value="very_strong">Very Strong Signal</option>
    </select>

    <select id="known">
        <option value="true">Known Network</option>
        <option value="false">Unknown Network</option>
    </select>

    <button onclick="checkRisk()">Check Risk</button>
</div>

<canvas id="chart" width="300" height="300"></canvas>

<h2 id="result"></h2>

<script>
let chart;

function checkRisk() {
    const data = {
        encryption: document.getElementById("encryption").value,
        password: document.getElementById("password").value,
        https: document.getElementById("https").value === "true",
        signal: document.getElementById("signal").value,
        known: document.getElementById("known").value === "true"
    };

    fetch('/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
        document.getElementById("result").innerText =
            `Risk: ${res.risk} (${res.level})`;

        drawChart(res.risk);
    });
}

function drawChart(value) {
    const ctx = document.getElementById('chart').getContext('2d');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [value, 100 - value],
                backgroundColor: ['red', '#ddd']
            }]
        },
        options: {
            cutout: '70%',
            plugins: { legend: { display: false } }
        }
    });
}
</script>

</body>
</html>
