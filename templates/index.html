<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafeHop — Wi-Fi Risk Scanner</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
body{background:#0c0c0e;color:#fff;font-family:Arial;padding:20px}

/* keep your existing styles (shortened here for clarity) */
.scan-btn{padding:10px 18px;border-radius:6px;border:none;cursor:pointer}
.card{background:#1a1a1f;padding:15px;border-radius:10px;margin-top:15px}
</style>
</head>

<body>

<h2>SafeHop WiFi Scanner</h2>

<button class="scan-btn" onclick="runScan()">Scan</button>

<!-- 🔥 NEW BUTTONS -->
<div style="margin-top:10px">
  <button class="scan-btn" onclick="showProtectionGuide()" style="background:#2563eb;color:white">
    🛡️ Secure My Device
  </button>

  <button class="scan-btn" onclick="manualCheck()" style="background:#f59e0b;color:black">
    ⚙️ Manual Check
  </button>
</div>

<!-- RESULTS -->
<div id="result" class="card"></div>

<!-- 🔥 SPEED METER -->
<div class="card">
  <h4>Network Speed</h4>
  <div id="speed-meter" style="font-size:40px">0 Mbps</div>
</div>

<script>

function runScan(){
  fetch('/auto-scan')
  .then(r=>r.json())
  .then(data=>{
    document.getElementById("result").innerText =
      "Risk: " + data.risk + " (" + data.level + ")";

    simulateSpeed();
  });
}

/* 🔥 SPEED */
function simulateSpeed(){
  let max = Math.floor(Math.random()*120)+20;
  let count = 0;
  let el = document.getElementById("speed-meter");

  let i=setInterval(()=>{
    count+=2;
    el.innerText=count+" Mbps";
    if(count>=max) clearInterval(i);
  },20);
}

/* 🔐 GUIDE */
function showProtectionGuide(){
alert(`🔐 PROTECT YOUR DEVICE

1. Use VPN
2. Avoid banking
3. Use HTTPS
4. Turn off sharing
5. Enable firewall
6. Update system
7. Avoid unknown WiFi`);
}

/* ⚙️ MANUAL CHECK */
function manualCheck(){
alert(`⚙️ MANUAL CHECK

✔ Enable VPN
✔ Firewall ON
✔ Antivirus
✔ Remove unknown WiFi
✔ Use HTTPS`);
}

</script>

</body>
</html>
