
<!DOCTYPE html>
<html>
<head>
    <title>Wi-Fi Risk Scorer</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 50px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
        }

        h2 {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>📶 Public Wi-Fi Risk Scorer</h1>

<button onclick="check()">Check Risk</button>

<h2 id="result"></h2>

<script>
function check() {
    fetch('/score', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            encryption: "open",
            password: "weak",
            https: false,
            signal: "very_strong",
            known: false
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            data.level + " (" + data.risk + ")";
    });
}
</script>

</body>
</html>
